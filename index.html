<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sensor Test</title>
<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:24px;
  font-family:Arial;
}
</style>
</head>
<body>

<div id="value">Click to Enable Sensor</div>

<script>
const value = document.getElementById("value");

function handleOrientation(event) {
  value.innerText = "Gamma: " + event.gamma;
}

function enable() {
  if (typeof DeviceOrientationEvent.requestPermission === "function") {
    DeviceOrientationEvent.requestPermission()
      .then(res => {
        if (res === "granted") {
          window.addEventListener("deviceorientation", handleOrientation);
          value.innerText = "Sensor Enabled";
        } else {
          value.innerText = "Permission Denied";
        }
      });
  } else {
    window.addEventListener("deviceorientation", handleOrientation);
    value.innerText = "Sensor Enabled";
  }
}

document.body.addEventListener("click", enable);
</script>

</body>
</html>
