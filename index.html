<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Dark Privacy Mode</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  font-family: Arial;
  transition: filter 0.3s ease, background 0.3s ease;
  background: white;
}

#debug {
  margin-top: 10px;
  font-size: 18px;
}
</style>
</head>

<body>

<h2>🔐 Private Content</h2>
<p id="debug">Tilt phone sideways</p>

<script>
const debug = document.getElementById("debug");
const threshold = 10;

function handleOrientation(event) {
  let gamma = event.gamma;

  if (gamma === null) {
    debug.innerText = "Sensor not available";
    return;
  }

  debug.innerText = "Gamma: " + gamma.toFixed(2);

  let tilt = Math.abs(gamma);

  if (tilt > threshold) {
    // FULL DARK MODE
    document.body.style.filter = "brightness(0.2)";
  } else {
    document.body.style.filter = "brightness(1)";
  }
}

function enableSensor() {
  if (typeof DeviceOrientationEvent.requestPermission === "function") {
    DeviceOrientationEvent.requestPermission()
      .then(response => {
        if (response === "granted") {
          window.addEventListener("deviceorientation", handleOrientation);
        }
      });
  } else {
    window.addEventListener("deviceorientation", handleOrientation);
  }
}

document.body.addEventListener("click", enableSensor);
</script>

</body>
</html>
